name = "buildaudit-mcp"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Custom domain — routes API traffic through buildaudit.dev zone
routes = [
  { pattern = "api.buildaudit.dev", custom_domain = true }
]

[vars]
ENVIRONMENT = "production"
STRIPE_PRO_PRICE_ID = "price_1TVizbFOBmZeyzXrtGUzkguF"
STRIPE_AGENCY_PRICE_ID = "price_1TVizbFOBmZeyzXryl5sRgJ8"
STRIPE_ENTERPRISE_PRICE_ID = "price_1TVizcFOBmZeyzXrs7qB0zpI"
PUBLIC_BASE_URL = "https://api.buildaudit.dev"

# QuickBooks Online OAuth + API config
# Secrets (QUICKBOOKS_CLIENT_ID, QUICKBOOKS_CLIENT_SECRET, QUICKBOOKS_STATE_SECRET)
# are uploaded via `wrangler secret put`, not declared here.
QUICKBOOKS_REDIRECT_URI = "https://api.buildaudit.dev/qb/callback"
QUICKBOOKS_ENVIRONMENT = "production"

# Durable Object for per-user auth + tier state
[durable_objects]
bindings = [
  { name = "USER_STATE", class_name = "UserState" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UserState"]
